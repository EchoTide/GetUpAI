name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            clients/desktop/package-lock.json
            shared-logic/package-lock.json

      - name: Install shared-logic dependencies
        run: |
          cd shared-logic
          npm install

      - name: Build shared-logic
        run: |
          cd shared-logic
          npm run build

      - name: Install desktop dependencies
        run: |
          cd clients/desktop
          npm install

      - name: Build and Distribute macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          cd clients/desktop
          npm run dist:mac

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clients/desktop/release-out/*.dmg
            clients/desktop/release-out/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            clients/desktop/package-lock.json
            shared-logic/package-lock.json

      - name: Install shared-logic dependencies
        run: |
          cd shared-logic
          npm install

      - name: Build shared-logic
        run: |
          cd shared-logic
          npm run build

      - name: Install desktop dependencies
        run: |
          cd clients/desktop
          npm install

      - name: Build and Distribute Windows
        run: |
          cd clients/desktop
          npm run dist:win

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clients/desktop/release-out/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
